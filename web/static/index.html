<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驾驶员疲劳监测系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --white:#ffffff;
  --surface:#f8f7f5;
  --panel:#ffffff;
  --panel-soft:rgba(255,255,255,.7);
  --border:#e5e2dc;
  --border2:#d4d0ca;
  --text:#1a1916;
  --muted:#6b6860;
  --muted2:#9b9890;
  --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --c-ok:#1a6e3e;
  --c-warn:#9a5f00;
  --c-alert:#b01c22;
  --bg-ok:#edf7f2;
  --bg-warn:#fdf6e3;
  --bg-alert:#fdf0f0;
  --bg-alert-pulse:#fbe6e6;
  --bd-ok:#b7dfca;
  --bd-warn:#f0d899;
  --bd-alert:#f5bdbd;
  --navy:#1c2f4a;
  --video-bg:#0d0d0d;
  --no-signal:#444;
  --no-signal-muted:#555;
  --r:10px;
}

body{font-family:var(--sans);background:var(--white);color:var(--text);display:flex;flex-direction:column;transition:background .25s,color .25s}
body.night-theme{
  --white:#0b1220;
  --surface:#111b2d;
  --panel:#162235;
  --panel-soft:rgba(22,34,53,.92);
  --border:#24344c;
  --border2:#35506f;
  --text:#e8eef9;
  --muted:#a7b6ca;
  --muted2:#7c8fa8;
  --c-ok:#59d98e;
  --c-warn:#ffca63;
  --c-alert:#ff7b8a;
  --bg-ok:#11271f;
  --bg-warn:#332713;
  --bg-alert:#34151d;
  --bg-alert-pulse:#47202b;
  --bd-ok:#244837;
  --bd-warn:#6d5526;
  --bd-alert:#70303b;
  --navy:#8cbcff;
  --video-bg:#04080f;
  --no-signal:#8fa3bf;
  --no-signal-muted:#6f86a6;
}

/* ── header ── */
header{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 28px;
  border-bottom:1px solid var(--border);
  background:var(--white);
  transition:background .25s,border-color .25s;
}
.h-title{
  font-family:var(--sans);
  font-weight:600;
  font-size:22px;
  letter-spacing:-.01em;
  color:var(--navy);
  line-height:1;
}
.h-title em{font-style:normal;font-weight:600}
.h-sub{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:3px}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .3s;flex-shrink:0}
.conn-dot.ok{background:var(--c-ok)}
.conn-dot.err{background:var(--c-alert)}

/* ── layout ── */
main{flex:1;display:flex;overflow:hidden}

/* ── video ── */
.video-section{
  flex:1;display:flex;flex-direction:column;
  padding:18px 22px;gap:12px;
  border-right:1px solid var(--border);overflow:hidden;
}
.source-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.tab-group{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;transition:background .25s,border-color .25s}
.tab{
  padding:5px 14px;border:none;background:transparent;border-radius:6px;
  font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tab.active{background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tab:hover:not(.active){color:var(--text)}
.btn{
  padding:6px 16px;border-radius:8px;border:1px solid transparent;
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{background:var(--bg-alert);color:var(--c-alert);border-color:var(--bd-alert)}
.btn-stop:hover{filter:brightness(1.06)}
.fps-badge{margin-left:auto;font-size:12px;color:var(--muted2);font-variant-numeric:tabular-nums}
.mode-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;margin-right:12px;transition:background .25s,border-color .25s}
.mode-btn{background:none;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted2);font-family:inherit;transition:all .15s}
.mode-btn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.16);font-weight:500}

.video-wrapper{
  flex:1;background:var(--video-bg);border-radius:var(--r);overflow:hidden;
  position:relative;min-height:180px;
  border:1px solid var(--border);
  transition:background .25s,border-color .25s;
}
/* 视频元素保持正常尺寸以确保浏览器正常解码帧 */
#videoEl{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:contain;background:var(--video-bg);
}
/* 服务器标注帧叠加在视频上方 */
#frameEl{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:contain;display:none;z-index:2;
}
#overlayCanvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:none;z-index:3;pointer-events:none;
}
.no-signal{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  gap:12px;color:var(--no-signal);user-select:none;z-index:10;
}
.no-signal svg{opacity:.3}
.no-signal-text{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--no-signal-muted)}
.loading-bar{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--navy),transparent);
  background-size:200% 100%;animation:shimmer 1.4s infinite;display:none;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── metrics panel ── */
.metrics-section{
  width:340px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  padding:16px 14px;display:flex;flex-direction:column;gap:10px;
}
.metrics-section::-webkit-scrollbar{width:3px}
.metrics-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;transition:background .25s,border-color .25s}
.card-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:10px}

/* ── 主状态卡 ── */
.status-card{
  border-left:4px solid var(--border2);
  transition:border-color .4s,background .4s,border .4s;
}
.status-card.ok  {border-left-color:var(--c-ok);  background:var(--bg-ok);  border-color:var(--bd-ok)}
.status-card.warn{border-left-color:var(--c-warn);background:var(--bg-warn);border-color:var(--bd-warn)}
.status-card.alrt{border-left-color:var(--c-alert);background:var(--bg-alert);border-color:var(--bd-alert);animation:pulse .9s infinite alternate}
@keyframes pulse{from{background:var(--bg-alert)}to{background:var(--bg-alert-pulse)}}

.status-main{font-size:26px;font-weight:600;letter-spacing:.02em;color:var(--muted);transition:color .3s}
.status-main.ok  {color:var(--c-ok)}
.status-main.warn{color:var(--c-warn)}
.status-main.alrt{color:var(--c-alert)}
.status-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── 疲劳指数 ── */
.score-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:10px}
.score-num{
  font-size:46px;font-weight:600;font-variant-numeric:tabular-nums;
  line-height:1;color:var(--muted);transition:color .3s;
}
.score-num.ok  {color:var(--c-ok)}
.score-num.warn{color:var(--c-warn)}
.score-num.alrt{color:var(--c-alert)}
.score-unit{font-size:14px;color:var(--muted);padding-bottom:6px}
.score-bar-track{width:100%;height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:6px}
.score-bar-fill{height:100%;border-radius:5px;transition:width .4s ease,background .4s}
.score-desc{font-size:12px;color:var(--muted)}

/* ── 症状列表 ── */
.symptom-list{display:flex;flex-direction:column;gap:7px}
.symptom-item{
  display:flex;align-items:center;gap:9px;
  font-size:13px;color:var(--text);
  padding:8px 10px;border-radius:8px;
  background:var(--panel-soft);border:1px solid var(--border);
}
.symptom-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.symptom-dot.warn{background:var(--c-warn)}
.symptom-dot.alrt{background:var(--c-alert)}
.no-symptom{font-size:13px;color:var(--muted2);padding:6px 0}

/* ── 眼睛&注意力 ── */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
  transition:background .25s,border-color .25s;
}
.mini-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);margin-bottom:6px}
.mini-val{font-size:14px;font-weight:500;color:var(--text)}
.mini-val.ok  {color:var(--c-ok)}
.mini-val.warn{color:var(--c-warn)}
.mini-val.alrt{color:var(--c-alert)}

.eye-bar-track{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.eye-bar-fill{height:100%;border-radius:2px;transition:width .25s,background .25s}

/* ── 行为依据 ── */
.evidence-summary{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;
}
.evidence-chip{
  min-width:0;padding:7px 8px;border-radius:8px;
  background:var(--panel);border:1px solid var(--border);
}
.evidence-chip span{
  display:block;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;color:var(--muted2);margin-bottom:3px;
}
.evidence-chip strong{
  display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-size:12px;font-weight:600;color:var(--text);
}
.evidence-list{display:flex;flex-direction:column;gap:7px}
.evidence-row{
  padding:8px 9px;border-radius:8px;background:var(--panel-soft);
  border:1px solid var(--border);
}
.evidence-row.active{border-color:var(--bd-warn);background:var(--bg-warn)}
.evidence-row.ready{border-color:var(--bd-ok);background:var(--bg-ok)}
.evidence-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.evidence-name{font-size:12px;font-weight:600;color:var(--text)}
.evidence-value{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.evidence-detail{font-size:11px;color:var(--muted);line-height:1.35;margin-top:5px}
.evidence-meter{height:5px;background:var(--border);border-radius:4px;overflow:hidden}
.evidence-fill{height:100%;width:0%;background:var(--muted2);transition:width .25s,background .25s}
.evidence-row.active .evidence-fill{background:var(--c-warn)}
.evidence-row.ready .evidence-fill{background:var(--c-ok)}

/* ── 建议 ── */
.advice-card{
  border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:flex-start;gap:10px;
  transition:background .4s,border-color .4s;
}
.advice-card.ok  {background:var(--bg-ok);border-color:var(--bd-ok)}
.advice-card.warn{background:var(--bg-warn);border-color:var(--bd-warn)}
.advice-card.alrt{background:var(--bg-alert);border-color:var(--bd-alert)}
.advice-icon{font-size:20px;flex-shrink:0;line-height:1.4}
.advice-text{font-size:13px;line-height:1.65;color:var(--text)}
.advice-text strong{display:block;font-weight:600;font-size:13px;margin-bottom:2px}

#fileInput{display:none}
.fatigue-alert{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at center, rgba(255,110,110,.30) 0%, rgba(176,28,34,.48) 45%, rgba(90,0,0,.78) 100%);
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .2s ease;
}
.fatigue-alert.active{opacity:1;animation:fatigueFlash .9s ease-in-out infinite alternate}
.fatigue-alert.active.warn{animation:distractionFlash 1.1s ease-in-out infinite alternate}
.fatigue-alert.active.alrt{animation:fatigueFlash .9s ease-in-out infinite alternate}
.fatigue-alert-card{
  min-width:280px;max-width:440px;padding:24px 28px;border-radius:18px;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(70,0,0,.55);backdrop-filter:blur(6px);
  box-shadow:0 16px 50px rgba(0,0,0,.35);text-align:center;color:#fff;
}
.fatigue-alert-card.warn{background:rgba(95,60,0,.62)}
.fatigue-alert-card.alrt{background:rgba(70,0,0,.58)}
.fatigue-alert-title{font-size:30px;font-weight:700;letter-spacing:.08em}
.fatigue-alert-sub{margin-top:10px;font-size:15px;line-height:1.6;color:rgba(255,255,255,.88)}
@keyframes fatigueFlash{
  from{background:radial-gradient(circle at center, rgba(255,110,110,.18) 0%, rgba(176,28,34,.40) 42%, rgba(90,0,0,.70) 100%)}
  to{background:radial-gradient(circle at center, rgba(255,170,170,.35) 0%, rgba(220,35,45,.62) 42%, rgba(110,0,0,.88) 100%)}
}
@keyframes distractionFlash{
  from{background:radial-gradient(circle at center, rgba(255,196,77,.16) 0%, rgba(154,95,0,.42) 42%, rgba(70,40,0,.70) 100%)}
  to{background:radial-gradient(circle at center, rgba(255,218,120,.34) 0%, rgba(184,115,0,.58) 42%, rgba(92,50,0,.82) 100%)}
}
</style>
</head>
<body>
<div class="fatigue-alert" id="fatigueAlert">
  <div class="fatigue-alert-card" id="fatigueAlertCard">
    <div class="fatigue-alert-title" id="fatigueAlertTitle">疲劳预警</div>
    <div class="fatigue-alert-sub" id="fatigueAlertSub">疲劳程度过高，请立即减速并尽快停车休息</div>
  </div>
</div>

<header>
  <div>
    <div class="h-title">驾驶员 <em>疲劳监测</em> 系统</div>
    <div class="h-sub">实时分析</div>
  </div>
  <div class="h-right">
    <div class="mode-switch" id="modeSwitch" title="切换白天/夜间模式">
      <button class="mode-btn active" data-cam="day">☀️ 白天</button>
      <button class="mode-btn" data-cam="night">🌙 夜间红外</button>
    </div>
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">未连接</span>
  </div>
</header>

<main>
  <!-- 视频区 -->
  <section class="video-section">
    <div class="source-bar">
      <div class="tab-group">
        <button class="tab active" data-mode="camera">摄像头</button>
        <button class="tab" data-mode="video">视频文件</button>
        <button class="tab" data-mode="image">图片</button>
      </div>
      <input type="file" id="fileInput">
      <button class="btn btn-primary" id="actionBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
        开启摄像头
      </button>
      <button class="btn btn-stop" id="stopBtn" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        停止
      </button>
      <span class="fps-badge" id="fpsBadge"></span>
    </div>

    <div class="video-wrapper">
      <video id="videoEl" muted autoplay playsinline></video>
      <img id="frameEl" alt="监测画面">
      <canvas id="overlayCanvas"></canvas>
      <div class="no-signal" id="noSignal">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 3l-4 4-4-4"/>
          <circle cx="12" cy="14" r="3"/>
        </svg>
        <span class="no-signal-text">暂无画面输入</span>
      </div>
      <div class="loading-bar" id="loadingBar"></div>
    </div>
  </section>

  <!-- 指标区 -->
  <aside class="metrics-section">

    <!-- 驾驶状态 -->
    <div class="card status-card" id="statusCard">
      <div class="card-label">当前驾驶状态</div>
      <div class="status-main" id="statusMain">状态良好</div>
      <div class="status-sub" id="statusSub">系统监测中，请保持专注驾驶</div>
    </div>

    <!-- 疲劳指数 -->
    <div class="card">
      <div class="card-label">疲劳程度</div>
      <div class="score-row">
        <span class="score-num" id="scoreNum">—</span>
        <span class="score-unit">/ 100</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="scoreFill" style="width:0%"></div>
      </div>
      <div class="score-desc" id="scoreDesc">等待检测数据…</div>
    </div>

    <!-- 风险信号 -->
    <div class="card">
      <div class="card-label">检测到的风险信号</div>
      <div class="symptom-list" id="symptomList">
        <span class="no-symptom">暂未检测到疲劳或分心信号</span>
      </div>
    </div>

    <!-- 眼睛 & 注意力 -->
    <div class="status-grid">
      <div class="mini-card">
        <div class="mini-label">眼睛状态</div>
        <div class="mini-val" id="eyeState">—</div>
        <div class="eye-bar-track">
          <div class="eye-bar-fill" id="eyeBar" style="width:0%"></div>
        </div>
      </div>
      <div class="mini-card">
        <div class="mini-label">注意力方向</div>
        <div class="mini-val" id="attnState">—</div>
      </div>
    </div>

    <!-- 行为依据 -->
    <div class="card">
      <div class="card-label">行为判定依据</div>
      <div class="evidence-summary">
        <div class="evidence-chip">
          <span>原始状态</span>
          <strong id="rawDistraction">—</strong>
        </div>
        <div class="evidence-chip">
          <span>稳定状态</span>
          <strong id="stableDistraction">—</strong>
        </div>
      </div>
      <div class="evidence-list" id="behaviorEvidence">
        <span class="no-symptom">等待检测数据…</span>
      </div>
    </div>

    <!-- 驾驶建议 -->
    <div class="advice-card ok" id="adviceCard">
      <div class="advice-icon" id="adviceIcon">✅</div>
      <div class="advice-text">
        <strong id="adviceTitle">状态良好</strong>
        <span id="adviceBody">驾驶状态正常，请继续保持专注。</span>
      </div>
    </div>

  </aside>
</main>

<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL      = `${protocol}//${location.host}/ws`;
const WS_FILE_URL = `${protocol}//${location.host}/ws/file`;
const API_URL     = location.origin;

let ws = null, stream = null, mode = 'camera';
let running = false, busy = false;
let fpsCount = 0, lastFpsTs = 0;
let lastSendTs = 0;
let lastOverlayState = null;
let lastProcessedFrame = { w: 0, h: 0 };
let attnModel = { emaYaw: null, level: 'ok' };
let headPoseModel = { emaPitch: null };
let fatigueAlarmActive = false;
let fatigueAudioCtx = null;
let lastAlarmBeepTs = 0;
let activeAlarmKey = '';
const FRAME_RATE_LIMIT_ENABLED = true;
const TARGET_FPS = 8; // 开启网页端限频：少发帧，给后端更稳定的检测时间
const CAMERA_MAX_W = 640;
const CAMERA_MAX_H = 480;
const CAMERA_JPEG_QUALITY = 0.72; // 小目标检测需要保留更多细节
const FATIGUE_ALARM_SCORE = 70;
const FATIGUE_BEEP_INTERVAL_MS = 1200;

const $ = id => document.getElementById(id);
const videoEl = $('videoEl'), frameEl = $('frameEl'), noSignal = $('noSignal');
const overlayCvs = $('overlayCanvas'), overlayCtx = overlayCvs.getContext('2d');

const fpsBadge = $('fpsBadge'), connDot = $('connDot'), connLabel = $('connLabel');

function ensureAudioReady() {
  if (!window.AudioContext && !window.webkitAudioContext) return null;
  if (!fatigueAudioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    fatigueAudioCtx = new Ctx();
  }
  if (fatigueAudioCtx.state === 'suspended') fatigueAudioCtx.resume().catch(() => {});
  return fatigueAudioCtx;
}

function playAlarmBeep() {
  const ctx = ensureAudioReady();
  if (!ctx || ctx.state !== 'running') return;

  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(960, now);
  osc.frequency.exponentialRampToValueAtTime(680, now + 0.22);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.3);
}

function hasDistractionState(s) {
  return !!(s && s.distraction && s.distraction !== 'NORMAL');
}

function distractionBoxLabel(distraction) {
  const labels = {
    PHONE_CALL: '打电话',
    PHONE_USE: '玩手机',
    PHONE: '玩手机',
    SUSPECTED_PHONE_USE: '疑似玩手机',
    DRINK: '喝水',
    SMOKE: '抽烟',
    HEAD_DOWN: '低头',
    LOOK_AROUND: '左顾右盼',
    GAZE_AWAY: '视线偏离',
  };
  return labels[distraction] || distraction;
}

function escHtml(v) {
  return String(v == null ? '—' : v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function num(v, digits = 1) {
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(digits) : '—';
}

function sec(v) {
  const n = Number(v);
  return Number.isFinite(n) ? `${n.toFixed(1)}s` : '—';
}

function deg(v) {
  const n = Number(v);
  return Number.isFinite(n) ? `${n.toFixed(1)}°` : '—';
}

function pct(value, target) {
  const v = Number(value) || 0;
  const t = Math.max(Number(target) || 0, 0.001);
  return Math.max(0, Math.min(100, Math.round(v / t * 100)));
}

function boxesCount(s, keys) {
  return keys.reduce((n, key) => n + (Array.isArray(s[key]) ? s[key].length : 0), 0);
}

function evidenceRow({name, value, detail, progress, active, ready}) {
  const cls = ready ? 'ready' : active ? 'active' : '';
  return `
    <div class="evidence-row ${cls}">
      <div class="evidence-head">
        <div class="evidence-name">${escHtml(name)}</div>
        <div class="evidence-value">${escHtml(value)}</div>
      </div>
      <div class="evidence-meter"><div class="evidence-fill" style="width:${Math.max(0, Math.min(100, progress || 0))}%"></div></div>
      <div class="evidence-detail">${escHtml(detail)}</div>
    </div>
  `;
}

function updateBehaviorEvidence(s) {
  const th = s.behavior_thresholds || {};
  const raw = s.behavior_raw || {};
  const timers = s.behavior_timers || {};
  const alerts = new Set(Array.isArray(s.behavior_alerts) ? s.behavior_alerts : []);
  const rawState = s.raw_distraction || 'NORMAL';
  const stableState = s.stable_distraction || s.distraction || 'NORMAL';

  $('rawDistraction').textContent = distractionBoxLabel(rawState);
  $('stableDistraction').textContent = distractionBoxLabel(stableState);

  const headPitchDeg = Number(th.head_down_pitch_deg ?? -18);
  const headAbsDeg = Math.abs(headPitchDeg);
  const headNeed = Number(th.head_down_seconds ?? 1.5);
  const headMode = th.head_down_pitch_mode || 'negative';
  const headDur = Number(s.head_down_duration ?? 0);
  const headNegDur = Number(s.head_down_negative_duration ?? 0);
  const headPosDur = Number(s.head_down_positive_duration ?? 0);
  let headCond = headMode === 'both'
    ? `pitch <= ${headPitchDeg.toFixed(0)}° 或 pitch >= ${headAbsDeg.toFixed(0)}°`
    : headMode === 'positive'
      ? `pitch >= ${headAbsDeg.toFixed(0)}°`
      : `pitch <= ${headPitchDeg.toFixed(0)}°`;

  headCond = headMode === 'both'
    ? `pitch_delta <= ${headPitchDeg.toFixed(0)}deg or pitch_delta >= ${headAbsDeg.toFixed(0)}deg`
    : headMode === 'positive'
      ? `pitch_delta >= ${headAbsDeg.toFixed(0)}deg`
      : `pitch_delta <= ${headPitchDeg.toFixed(0)}deg`;

  const lookNeed = Number(th.look_around_seconds ?? 2.0);
  const yawDeg = Number(th.yaw_threshold_deg ?? 30);
  const lookLeft = Number(s.look_left_duration ?? 0);
  const lookRight = Number(s.look_right_duration ?? 0);
  const lookDur = Math.max(lookLeft, lookRight);

  const phoneNeed = Number(th.phone_duration_seconds ?? 2.0);
  const phoneTimer = Math.max(Number(timers.PHONE_CALL ?? 0), Number(timers.PHONE_USE ?? 0), Number(timers.PHONE ?? 0));
  const phoneReady = alerts.has('PHONE_CALL') || alerts.has('PHONE_USE') || alerts.has('PHONE');
  const phoneRaw = !!(raw.phone || raw.phone_call || raw.phone_use);

  const drinkNeed = Number(th.drink_duration_seconds ?? 1.2);
  const drinkTimer = Number(timers.DRINK ?? 0);
  const drinkReady = alerts.has('DRINK');

  const smokeNeed = Number(th.smoke_duration_seconds ?? 1.5);
  const smokeTimer = Number(timers.SMOKE ?? 0);
  const smokeReady = alerts.has('SMOKE');

  const rows = [
    evidenceRow({
      name: '低头',
      value: `pitch_delta ${deg(s.pitch)} / ${sec(headDur)}`,
      detail: `条件 ${headCond}，需持续 ${sec(headNeed)}；原始 pitch ${deg(s.raw_pitch)}，基准 ${s.pitch_calibrated ? deg(s.pitch_baseline) : '临时'}；负向 ${sec(headNegDur)}，正向 ${sec(headPosDur)}；位姿${s.pose_valid ? '有效' : '无效'}${s.pose_held ? '，保持中' : ''}${s.posture_suppressed ? '；物体行为/哈欠中，暂停姿态告警' : ''}`,
      progress: pct(headDur, headNeed),
      active: rawState === 'HEAD_DOWN',
      ready: stableState === 'HEAD_DOWN',
    }),
    evidenceRow({
      name: '左顾右盼',
      value: `yaw ${deg(s.yaw)} / ${sec(lookDur)}`,
      detail: `条件 |yaw_delta| >= ${yawDeg.toFixed(0)}°，需持续 ${sec(lookNeed)}；左 ${sec(lookLeft)}，右 ${sec(lookRight)}；原始 yaw ${deg(s.raw_yaw)}，基准 ${s.yaw_calibrated ? deg(s.yaw_baseline) : '临时'}；位姿${s.pose_valid ? '有效' : '无效'}${s.yaw_suppressed_by_yawn ? '；哈欠中，暂停 yaw 计时' : ''}${s.posture_suppressed ? '；物体行为/哈欠中，暂停姿态告警' : ''}`,
      progress: pct(lookDur, lookNeed),
      active: rawState === 'LOOK_AROUND' || rawState === 'GAZE_AWAY',
      ready: stableState === 'LOOK_AROUND' || stableState === 'GAZE_AWAY',
    }),
    evidenceRow({
      name: '手机/打电话',
      value: `${phoneRaw ? '触发中' : '未触发'} / ${sec(phoneTimer)}`,
      detail: `手机框 ${boxesCount(s, ['phone_boxes'])}；近耳=${raw.phone_call ? '是' : '否'}，玩手机=${raw.phone_use ? '是' : '否'}，需 ${sec(phoneNeed)}`,
      progress: pct(phoneTimer, phoneNeed),
      active: phoneRaw,
      ready: phoneReady,
    }),
    evidenceRow({
      name: '喝水',
      value: `${raw.drink ? '触发中' : '未触发'} / ${sec(drinkTimer)}`,
      detail: `杯/瓶框 ${boxesCount(s, ['bottle_boxes', 'cup_boxes', 'drink_boxes'])}；靠近嘴部需持续 ${sec(drinkNeed)}`,
      progress: pct(drinkTimer, drinkNeed),
      active: !!raw.drink,
      ready: drinkReady,
    }),
    evidenceRow({
      name: '抽烟',
      value: `${raw.smoke ? '触发中' : '未触发'} / ${sec(smokeTimer)}`,
      detail: `香烟/烟雾框 ${boxesCount(s, ['cigarette_boxes', 'smoke_boxes'])}；靠近嘴部需持续 ${sec(smokeNeed)}`,
      progress: pct(smokeTimer, smokeNeed),
      active: !!raw.smoke,
      ready: smokeReady,
    }),
  ];

  $('behaviorEvidence').innerHTML = rows.join('');
}

function currentAlarmMeta(s) {
  if (!s) return null;
  if (s.fatigue === 'ALERT') {
    return {
      key: 'FATIGUE_ALERT',
      level: 'alrt',
      title: '疲劳预警',
      sub: '疲劳程度过高，请立即减速并尽快停车休息',
    };
  }
  const meta = DISTRACTION_ALARMS[s.distraction];
  return meta ? { key: 'DISTRACTION_' + s.distraction, ...meta } : null;
}

function syncSafetyAlarm(s) {
  const meta = currentAlarmMeta(s);
  if (!meta) {
    fatigueAlarmActive = false;
    activeAlarmKey = '';
    fatigueAlert.classList.remove('active', 'warn', 'alrt');
    fatigueAlertCard.classList.remove('warn', 'alrt');
    return;
  }

  fatigueAlarmActive = true;
  if (activeAlarmKey !== meta.key) {
    activeAlarmKey = meta.key;
    lastAlarmBeepTs = 0;
  }
  fatigueAlertTitle.textContent = meta.title;
  fatigueAlertSub.textContent = meta.sub;
  fatigueAlert.className = 'fatigue-alert active ' + meta.level;
  fatigueAlertCard.className = 'fatigue-alert-card ' + meta.level;

  const now = performance.now();
  const interval = meta.level === 'alrt' ? FATIGUE_BEEP_INTERVAL_MS : 1800;
  if (now - lastAlarmBeepTs >= interval) {
    lastAlarmBeepTs = now;
    playAlarmBeep();
  }
}

// ── websocket ─────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen    = () => setConn('ok', '已连接');
  ws.onclose   = () => { setConn('', '未连接'); busy = false; if (running) setTimeout(connectWS, 1500); };
  ws.onerror   = () => setConn('err', '连接异常');
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (mode === 'camera') showCameraOutput(d.state);
      else if (d.frame) showFrame(d.frame, d.state);
      updateUI(d.state);
      fpsCount++;
    } catch(_){}
    busy = false;
  };
}
function setConn(cls, label) {
  connDot.className = 'conn-dot' + (cls ? ' '+cls : '');
  connLabel.textContent = label;
}

// ── camera ────────────────────────────────────────────────────────────────
async function startCamera() {
  actionBtn.disabled = true;
  loadingBar.style.display = 'block';
  try {
    stream = await navigator.mediaDevices.getUserMedia(
      { video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' } });
    videoEl.srcObject = stream;
    await videoEl.play();
  } catch(err) { alert('摄像头错误：' + err.message); actionBtn.disabled=false; loadingBar.style.display='none'; return; }
  await fetch(API_URL+'/reset',{method:'POST'}).catch(()=>{});
  videoEl.style.display = 'block';
  frameEl.style.display = 'none';
  clearOverlay();
  connectWS(); go();
}

// 上传视频到服务端（支持任意格式，由 OpenCV 解码）
function uploadVideo(file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', API_URL + '/upload-video');
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) onProgress(e.loaded / e.total);
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { reject(new Error('响应解析失败')); }
      } else {
        reject(new Error(`上传失败 (${xhr.status})`));
      }
    };
    xhr.onerror = () => reject(new Error('网络错误'));
    const fd = new FormData();
    fd.append('file', file);
    xhr.send(fd);
  });
}

async function startVideo(file) {
  actionBtn.disabled = true;
  loadingBar.style.display = 'block';
  noSignal.style.display = 'none';
  videoEl.style.display = 'none';
  clearOverlay();
  frameEl.style.display = 'none';
  fpsBadge.textContent = '上传中 0%';

  // 第一步：上传到服务器（浏览器不支持 AVI，由服务端 OpenCV 解码）
  let uploadData;
  try {
    uploadData = await uploadVideo(file, pct => {
      fpsBadge.textContent = `上传中 ${Math.round(pct * 100)}%`;
    });
  } catch(e) {
    alert('上传失败：' + e.message);
    loadingBar.style.display = 'none';
    noSignal.style.display = 'flex';
    actionBtn.disabled = false;
    fpsBadge.textContent = '';
    return;
  }

  fpsBadge.textContent = '分析中…';

  // 第二步：连接 /ws/file，服务端主动推帧
  const fileWS = new WebSocket(WS_FILE_URL);
  ws = fileWS;

  fileWS.onopen = () => {
    setConn('ok', '分析中');
    fileWS.send(JSON.stringify({ path: uploadData.path }));
    running = true;
    actionBtn.style.display = 'none';
    stopBtn.style.display = 'inline-flex';
  };

  fileWS.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.done) {
        fpsBadge.textContent = '分析完成 ✓';
        running = false;
        stopBtn.style.display = 'none';
        actionBtn.style.display = 'inline-flex';
        actionBtn.disabled = false;
        setConn('', '完成');
        return;
      }
      if (d.error) {
        alert('视频处理失败：' + d.error);
        stopAll();
        return;
      }
      showFrame(d.frame, d.state);
      updateUI(d.state);
      if (d.progress != null) {
        fpsBadge.textContent = Math.round(d.progress * 100) + '%';
      }
    } catch(_) {}
  };

  fileWS.onclose = () => {
    if (running) setConn('', '中断');
    running = false;
  };

  fileWS.onerror = () => setConn('err', '连接异常');
}

function go() {
  running=true; busy=false;
  actionBtn.style.display='none'; stopBtn.style.display='inline-flex';
  requestAnimationFrame(frameLoop);
}

async function analyzeImage(file) {
  loadingBar.style.display='block'; noSignal.style.display='none'; videoEl.style.display='none'; frameEl.style.display='none';
  clearOverlay();
  try {
    const fd=new FormData(); fd.append('file',file);
    const r = await fetch(API_URL+'/analyze',{method:'POST',body:fd});
    const d = await r.json();
    if (d.frame) showFrame(d.frame, d.state);
    if (d.state) updateUI(d.state);
  } catch(e){ console.error(e); }
  loadingBar.style.display='none';
}

// ── frame loop ────────────────────────────────────────────────────────────
function frameLoop() {
  if (!running) return;
  requestAnimationFrame(frameLoop);
  if (busy || !ws || ws.readyState!==WebSocket.OPEN || videoEl.readyState<2) return;

  // 帧率限制：避免发帧过快导致后端堆积
  const tsNow = performance.now();
  if (FRAME_RATE_LIMIT_ENABLED && tsNow - lastSendTs < 1000 / TARGET_FPS) return;
  lastSendTs = tsNow;

  // 保留 640x480 细节；手机/香烟/水杯都是小目标，过度压缩会明显降低精度
  const MAX_W = CAMERA_MAX_W, MAX_H = CAMERA_MAX_H;
  let vw = videoEl.videoWidth  || 640;
  let vh = videoEl.videoHeight || 480;
  if (vw > MAX_W || vh > MAX_H) {
    const scale = Math.min(MAX_W / vw, MAX_H / vh);
    vw = Math.round(vw * scale);
    vh = Math.round(vh * scale);
  }
  lastProcessedFrame = { w: vw, h: vh };
  hiddenCvs.width  = vw;
  hiddenCvs.height = vh;
  hiddenCtx.drawImage(videoEl, 0, 0, vw, vh);

  busy = true;
  hiddenCvs.toBlob(blob => {
    blob.arrayBuffer().then(buf => {
      if (ws && ws.readyState===WebSocket.OPEN) ws.send(buf);
      else busy=false;
    });
  }, 'image/jpeg', CAMERA_JPEG_QUALITY);

  const now = performance.now();
  if (now - lastFpsTs >= 1000) {
    fpsBadge.textContent = fpsCount + ' fps';
    fpsCount = 0; lastFpsTs = now;
  }
}

function stopAll() {
  running = false; busy = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  videoEl.pause();
  videoEl.srcObject = null;
  videoEl.src = '';
  videoEl.load(); // 释放资源
  videoEl.style.display = 'block';
  clearOverlay();
  overlayCvs.style.display = 'none';
  frameEl.style.display = 'none';
  frameEl.src = '';
  noSignal.style.display = 'flex';
  loadingBar.style.display = 'none';
  actionBtn.style.display = 'inline-flex';
  actionBtn.disabled = false;
  stopBtn.style.display = 'none';
  fpsBadge.textContent = '';
  fpsCount = 0;
  setConn('', '未连接');
  resetUI();
}

function showFrame(b64, state = null) {
  lastOverlayState = state || null;
  videoEl.style.display = 'none';
  overlayCvs.style.display = state ? 'block' : 'none';
  if (!state) clearOverlay();
  frameEl.src = 'data:image/jpeg;base64,' + b64;
  frameEl.style.display = 'block';
  noSignal.style.display = 'none';
  loadingBar.style.display = 'none';
  actionBtn.disabled = false;
  if (state && frameEl.complete && frameEl.naturalWidth) drawOverlay(state);
}

function showCameraOutput(state) {
  videoEl.style.display = 'block';
  frameEl.style.display = 'none';
  frameEl.src = '';
  overlayCvs.style.display = 'block';
  noSignal.style.display = 'none';
  loadingBar.style.display = 'none';
  actionBtn.disabled = false;
  drawOverlay(state);
}

function syncOverlayCanvas() {
  const rect = overlayCvs.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const width = Math.max(1, Math.round(rect.width * dpr));
  const height = Math.max(1, Math.round(rect.height * dpr));
  if (overlayCvs.width !== width || overlayCvs.height !== height) {
    overlayCvs.width = width;
    overlayCvs.height = height;
  }
  overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { width: rect.width, height: rect.height };
}

function clearOverlay() {
  lastOverlayState = null;
  const { width, height } = syncOverlayCanvas();
  overlayCtx.clearRect(0, 0, width, height);
}

function containRect(srcW, srcH, dstW, dstH) {
  if (!srcW || !srcH || !dstW || !dstH) return null;
  const scale = Math.min(dstW / srcW, dstH / srcH);
  const width = srcW * scale;
  const height = srcH * scale;
  return {
    x: (dstW - width) / 2,
    y: (dstH - height) / 2,
    width,
    height,
  };
}

function overlayColor(fatigue) {
  if (fatigue === 'ALERT') return '#dc4c64';
  if (fatigue === 'WARNING') return '#f0b429';
  return '#64d38a';
}

function drawMappedBox(bbox, fitted, scaleX, scaleY, style = {}) {
  if (!bbox || bbox.length !== 4) return null;
  const [x, y, w, h] = bbox.map(v => Number(v) || 0);
  const dx = fitted.x + x * scaleX;
  const dy = fitted.y + y * scaleY;
  const dw = w * scaleX;
  const dh = h * scaleY;
  overlayCtx.strokeStyle = style.color || '#ffffff';
  overlayCtx.lineWidth = style.lineWidth || 2;
  if (style.dash) overlayCtx.setLineDash(style.dash);
  else overlayCtx.setLineDash([]);
  overlayCtx.strokeRect(dx, dy, dw, dh);
  overlayCtx.setLineDash([]);

  if (style.label) {
    overlayCtx.font = style.font || '600 12px Inter, sans-serif';
    const textWidth = overlayCtx.measureText(style.label).width;
    const tagW = textWidth + 10;
    const tagH = 20;
    const tagY = Math.max(0, dy - tagH);
    overlayCtx.fillStyle = style.color || '#ffffff';
    overlayCtx.fillRect(dx, tagY, tagW, tagH);
    overlayCtx.fillStyle = '#ffffff';
    overlayCtx.textBaseline = 'middle';
    overlayCtx.fillText(style.label, dx + 5, tagY + tagH / 2);
  }

  return { dx, dy, dw, dh };
}

function drawOverlay(state) {
  lastOverlayState = state || null;
  const { width: canvasW, height: canvasH } = syncOverlayCanvas();
  overlayCtx.clearRect(0, 0, canvasW, canvasH);
  if (!state) return;

  let displayWidth = 0;
  let displayHeight = 0;
  let sourceWidth = 0;
  let sourceHeight = 0;

  if (mode === 'camera' && videoEl.videoWidth && videoEl.videoHeight && lastProcessedFrame.w && lastProcessedFrame.h) {
    displayWidth = videoEl.videoWidth;
    displayHeight = videoEl.videoHeight;
    sourceWidth = lastProcessedFrame.w;
    sourceHeight = lastProcessedFrame.h;
  } else if (frameEl.naturalWidth && frameEl.naturalHeight) {
    displayWidth = frameEl.naturalWidth;
    displayHeight = frameEl.naturalHeight;
    sourceWidth = frameEl.naturalWidth;
    sourceHeight = frameEl.naturalHeight;
  } else {
    return;
  }

  const fitted = containRect(displayWidth, displayHeight, canvasW, canvasH);
  const bbox = state.face_bbox;
  if (!fitted || !bbox || bbox.length !== 4 || !sourceWidth || !sourceHeight) return;

  const scaleX = fitted.width / sourceWidth;
  const scaleY = fitted.height / sourceHeight;
  const hasDistraction = hasDistractionState(state);
  const color = hasDistraction ? overlayColor('WARNING') : (state.eye_occluded ? overlayColor('WARNING') : overlayColor(state.fatigue));
  const label = hasDistraction ? distractionBoxLabel(state.distraction) : (state.eye_occluded ? '眼部遮挡' : (state.fatigue || 'NORMAL'));
  const phoneBoxes = Array.isArray(state.phone_boxes) ? state.phone_boxes : [];
  const cigaretteBoxes = Array.isArray(state.cigarette_boxes) ? state.cigarette_boxes : [];
  const smokeBoxes = Array.isArray(state.smoke_boxes) ? state.smoke_boxes : [];
  const drinkBoxes = [
    ...(Array.isArray(state.bottle_boxes) ? state.bottle_boxes : []),
    ...(Array.isArray(state.cup_boxes) ? state.cup_boxes : []),
    ...(Array.isArray(state.drink_boxes) ? state.drink_boxes : []),
  ];

  drawMappedBox(state.face_bbox, fitted, scaleX, scaleY, {
    color,
    lineWidth: 2,
    label,
    font: '600 13px Inter, sans-serif',
  });
  drawMappedBox(state.left_eye_bbox, fitted, scaleX, scaleY, {
    color: '#5dade2',
    lineWidth: 1.5,
    label: '左眼',
    dash: [4, 3],
  });
  drawMappedBox(state.right_eye_bbox, fitted, scaleX, scaleY, {
    color: '#5dade2',
    lineWidth: 1.5,
    label: '右眼',
    dash: [4, 3],
  });
  drawMappedBox(state.mouth_bbox, fitted, scaleX, scaleY, {
    color: '#c56cf0',
    lineWidth: 1.5,
    label: '嘴巴',
    dash: [6, 3],
  });
  phoneBoxes.forEach(box => {
    drawMappedBox(box, fitted, scaleX, scaleY, {
      color: '#ff9f43',
      lineWidth: 2,
      label: '手机',
    });
  });
  cigaretteBoxes.forEach(box => {
    drawMappedBox(box, fitted, scaleX, scaleY, {
      color: '#ff6b6b',
      lineWidth: 2,
      label: '香烟',
    });
  });
  smokeBoxes.forEach(box => {
    drawMappedBox(box, fitted, scaleX, scaleY, {
      color: '#ff6b6b',
      lineWidth: 2,
      label: '烟雾',
    });
  });
  drinkBoxes.forEach(box => {
    drawMappedBox(box, fitted, scaleX, scaleY, {
      color: '#4cd137',
      lineWidth: 2,
      label: '水杯',
    });
  });
}

window.addEventListener('resize', () => {
  if (lastOverlayState && overlayCvs.style.display !== 'none') drawOverlay(lastOverlayState);
  else if (overlayCvs.style.display !== 'none') clearOverlay();
});
videoEl.addEventListener('loadedmetadata', () => {
  if (mode === 'camera' && lastOverlayState) drawOverlay(lastOverlayState);
});
frameEl.addEventListener('load', () => {
  if (frameEl.style.display === 'none') return;
  if (lastOverlayState) {
    overlayCvs.style.display = 'block';
    drawOverlay(lastOverlayState);
  } else {
    overlayCvs.style.display = 'none';
    clearOverlay();
  }
});

// ── UI update ─────────────────────────────────────────────────────────────
const STATE_CLS  = { NORMAL:'ok', WARNING:'warn', ALERT:'alrt' };
const STATE_TEXT = { NORMAL:'状态良好', WARNING:'轻度疲劳', ALERT:'严重疲劳' };
const STATE_SUB  = {
  NORMAL: '系统监测中，请保持专注驾驶',
  WARNING:'检测到疲劳迹象，请注意行车安全',
  ALERT:  '疲劳程度较高，存在安全风险！',
};
const ADVICE = {
  ok:  { icon:'✅', title:'驾驶状态良好', body:'未检测到明显疲劳，请继续保持专注，安全驾驶。' },
  warn:{ icon:'⚠️', title:'建议适当休息', body:'检测到疲劳迹象。建议开窗通风、播放音乐，或在安全地点停车稍事休息。' },
  alrt:{ icon:'🛑', title:'请立即停车休息', body:'疲劳程度较高，继续驾驶存在危险。请尽快找到安全地点停车休息。' },
};

function fatigueScore(s) {
  let n = 0;
  if (s.perclos           != null) n += Math.min(s.perclos / 0.55, 1) * 45;
  if (s.continuous_closed != null) n += Math.min(s.continuous_closed / 5.0, 1) * 30;
  if (s.yawn_count        != null) n += Math.min(s.yawn_count / 24.0, 1) * 10;
  if (s.lstm_score        != null) n += Math.max(0, s.lstm_score - 0.55) / 0.45 * 15;
  // hard floor/ceil from rule engine state
  if (s.fatigue === 'ALERT')   n = Math.max(n, 70);
  if (s.fatigue === 'WARNING') n = Math.max(n, 30);
  if (s.fatigue === 'NORMAL')  n = Math.min(n, 45);
  return Math.min(Math.round(n), 100);
}

function getSymptoms(s) {
  const items = [];
  const hasPhoneBox = Array.isArray(s.phone_boxes) && s.phone_boxes.length > 0;
  const hasDrinkBox =
    (Array.isArray(s.bottle_boxes) && s.bottle_boxes.length > 0) ||
    (Array.isArray(s.cup_boxes) && s.cup_boxes.length > 0) ||
    (Array.isArray(s.drink_boxes) && s.drink_boxes.length > 0);
  const postureAlerts = new Set(Array.isArray(s.posture_alerts) ? s.posture_alerts : []);
  const headDown = headDownState(s.pitch);
  if (s.distraction === 'PHONE_CALL') {
    items.push({t:'检测到打电话行为', lvl:'alrt'});
  } else if (s.distraction === 'PHONE_USE' || s.distraction === 'PHONE') {
    items.push({t:'检测到玩手机行为', lvl:'alrt'});
  } else if (s.distraction === 'SUSPECTED_PHONE_USE') {
    items.push({t:'疑似低头玩手机', lvl:'warn'});
  } else if (hasPhoneBox) {
    items.push({t:'检测到手机', lvl:'warn'});
  }
  if (s.distraction === 'DRINK')
    items.push({t:'检测到喝水行为', lvl:'warn'});
  else if (hasDrinkBox)
    items.push({t:'检测到杯子/水瓶', lvl:'warn'});
  if (s.distraction === 'SMOKE')
    items.push({t:'检测到抽烟行为', lvl:'warn'});
  if (s.distraction === 'HEAD_DOWN')
    items.push({t:'检测到低头行为', lvl:'warn'});
  if (s.distraction === 'LOOK_AROUND')
    items.push({t:'检测到左顾右盼行为', lvl:'warn'});
  if (postureAlerts.has('HEAD_DOWN') && s.distraction !== 'HEAD_DOWN')
    items.push({t:'同时检测到低头姿态', lvl:'warn'});
  if (postureAlerts.has('LOOK_AROUND') && s.distraction !== 'LOOK_AROUND')
    items.push({t:'同时检测到左顾右盼姿态', lvl:'warn'});
  if (s.distraction === 'GAZE_AWAY')
    items.push({t:'检测到视线偏离', lvl:'warn'});
  if (s.eye_occluded && !hasDistractionState(s))
    items.push({t:'眼部遮挡', lvl:'warn'});
  // PERCLOS：眼睛在 3 秒窗口内闭合比例
  if (s.perclos != null && s.perclos >= 0.28)
    items.push({t:'眼睛闭合频率偏高', lvl: s.perclos >= 0.55 ? 'alrt' : 'warn'});

  // 哈欠：当前帧 MAR 需 >= 0.70（避免轻微张嘴误报）
  if (s.mar != null && s.mar >= 0.70)
    items.push({t:'检测到哈欠动作', lvl:'warn'});

  // 持续闭眼
  if (s.continuous_closed != null && s.continuous_closed >= 2.5)
    items.push({t:`眼睛持续闭合 ${s.continuous_closed.toFixed(1)} 秒`,
                lvl: s.continuous_closed >= 5 ? 'alrt' : 'warn'});

  // yawn_count 是窗口内哈欠帧数（非次数），窗口约 90 帧；>= 15 帧才有意义
  if (s.yawn_count != null && s.yawn_count >= 18)
    items.push({t:'持续哈欠中', lvl: s.yawn_count >= 45 ? 'alrt' : 'warn'});

  // 点头：events/s，>= 0.6/s 才报警（之前 0.25/s 太敏感）
  if (s.nod_freq != null && s.nod_freq >= 0.8)
    items.push({t:'检测到点头现象', lvl:'warn'});

  if (headDown.level === 'alrt')
    items.push({t:'检测到持续低头动作', lvl:'alrt'});
  else if (headDown.level === 'warn')
    items.push({t:'检测到低头动作', lvl:'warn'});

  if (s.lstm_pred === 1)
    items.push({t:'行为特征分析显示疲劳', lvl:'warn'});

  return items;
}

function eyeState(ear, eyeOccluded) {
  if (eyeOccluded) return { text:'眼部遮挡', cls:'warn', pct:35 };
  if (ear == null) return { text:'—', cls:'', pct:0 };
  if (ear < 0.14)  return { text:'闭眼',    cls:'alrt', pct: Math.round(ear/0.14*20)   };
  if (ear < 0.20)  return { text:'半睁眼',  cls:'warn', pct: Math.round(ear/0.35*100)  };
                   return { text:'正常睁眼', cls:'ok',   pct: Math.min(Math.round(ear/0.35*100), 100) };
}

function headDownState(pitch) {
  if (pitch == null) {
    headPoseModel = { emaPitch: null };
    return { level:'ok', pitch:0 };
  }
  const p = Number(pitch) || 0;
  headPoseModel.emaPitch = headPoseModel.emaPitch == null ? p : (headPoseModel.emaPitch * 0.7 + p * 0.3);
  const smoothedPitch = headPoseModel.emaPitch;
  if (smoothedPitch <= -18) return { level:'alrt', pitch:smoothedPitch };
  if (smoothedPitch <= -10) return { level:'warn', pitch:smoothedPitch };
  return { level:'ok', pitch:smoothedPitch };
}

function attnState(distraction, yaw, eyeOccluded) {
  if (distraction === 'PHONE_CALL') return { text:'打电话', cls:'alrt' };
  if (distraction === 'PHONE_USE' || distraction === 'PHONE') return { text:'玩手机', cls:'alrt' };
  if (distraction === 'SUSPECTED_PHONE_USE') return { text:'疑似玩手机', cls:'warn' };
  if (distraction === 'DRINK') return { text:'喝水分心', cls:'warn' };
  if (distraction === 'SMOKE') return { text:'抽烟分心', cls:'warn' };
  if (distraction === 'HEAD_DOWN') return { text:'低头分心', cls:'warn' };
  if (distraction === 'LOOK_AROUND') return { text:'左顾右盼', cls:'warn' };
  if (distraction === 'GAZE_AWAY') return { text:'注意力分散', cls:'warn' };
  if (eyeOccluded) {
    attnModel = { emaYaw: null, level: 'warn' };
    return { text:'无法判断', cls:'warn' };
  }
  if (mode !== 'camera') {
    attnModel = { emaYaw: null, level: 'ok' };
    return { text:'专注前方', cls:'ok' };
  }

  const absYaw = yaw != null ? Math.abs(Number(yaw) || 0) : 0;
  attnModel.emaYaw = attnModel.emaYaw == null ? absYaw : (attnModel.emaYaw * 0.72 + absYaw * 0.28);

  const smoothedYaw = attnModel.emaYaw;
  let nextLevel = attnModel.level;

  if (attnModel.level === 'alrt') {
    if (smoothedYaw < 22) nextLevel = 'ok';
    else if (smoothedYaw < 34) nextLevel = 'warn';
  } else if (attnModel.level === 'warn') {
    if (smoothedYaw >= 40) nextLevel = 'alrt';
    else if (smoothedYaw < 18) nextLevel = 'ok';
  } else {
    if (smoothedYaw >= 40) nextLevel = 'alrt';
    else if (smoothedYaw >= 24) nextLevel = 'warn';
  }

  attnModel.level = nextLevel;
  if (nextLevel === 'alrt') return { text:'注意力分散', cls:'alrt' };
  if (nextLevel === 'warn') return { text:'轻度分散', cls:'warn' };
  return { text:'专注前方', cls:'ok' };
}

function scoreColor(n) {
  if (n >= 70) return '#b01c22';
  if (n >= 35) return '#9a5f00';
  return '#1a6e3e';
}
function scoreDesc(n, f) {
  if (f === 'ALERT')   return '疲劳程度严重，行车风险高';
  if (f === 'WARNING') return '存在一定疲劳，请注意休息';
  if (n < 15)          return '精神状态良好';
  return '疲劳程度较低，继续监测中';
}

function statusMeta(s) {
  if (s.distraction === 'PHONE_CALL') {
    return {
      cls: 'alrt',
      main: '分心预警：打电话',
      sub: '手机位于耳侧区域，驾驶注意力受到明显干扰',
    };
  }
  if (s.distraction === 'PHONE_USE' || s.distraction === 'PHONE') {
    return {
      cls: 'alrt',
      main: '分心预警：玩手机',
      sub: '手机位于脸部下方或手持区域，请立即放下手机并专注前方',
    };
  }
  if (s.distraction === 'SUSPECTED_PHONE_USE') {
    return {
      cls: 'warn',
      main: '分心预警：疑似玩手机',
      sub: '未稳定检测到手机，但头部姿态持续低头，建议确认驾驶员注意力',
    };
  }
  if (s.distraction === 'DRINK') {
    return {
      cls: 'warn',
      main: '分心预警：喝水',
      sub: '杯子或水瓶接近嘴部区域，建议完成操作后再继续驾驶',
    };
  }
  if (s.distraction === 'SMOKE') {
    return {
      cls: 'warn',
      main: '分心预警：抽烟',
      sub: '检测到手持香烟或吸烟行为，可能影响驾驶安全',
    };
  }
  if (s.distraction === 'HEAD_DOWN') {
    return {
      cls: 'warn',
      main: '分心预警：低头',
      sub: '头部姿态持续偏离前方，请尽快恢复视线',
    };
  }
  if (s.distraction === 'LOOK_AROUND') {
    return {
      cls: 'warn',
      main: '分心预警：左顾右盼',
      sub: '检测到持续观察侧方，请尽快恢复视线前方',
    };
  }
  if (s.distraction === 'GAZE_AWAY') {
    return {
      cls: 'warn',
      main: '分心预警：视线偏离',
      sub: '检测到视线持续偏离前方，请保持注意力集中',
    };
  }
  if (s.eye_occluded) {
    return {
      cls: 'warn',
      main: '眼部遮挡',
      sub: '检测到眼部区域被遮挡，眼睛相关指标可信度下降',
    };
  }
  const fatigueCls = STATE_CLS[s.fatigue] || 'ok';
  return {
    cls: fatigueCls,
    main: STATE_TEXT[s.fatigue] || '状态良好',
    sub: STATE_SUB[s.fatigue] || '',
  };
}

function adviceMeta(s, statusCls) {
  if (s && DISTRACTION_ADVICE[s.distraction]) {
    return DISTRACTION_ADVICE[s.distraction];
  }
  return ADVICE[statusCls] || ADVICE.ok;
}

function updateUI(s) {
  if (!s) return;
  const status = statusMeta(s);
  const fc  = status.cls;
  const fatigueCls = STATE_CLS[s.fatigue] || 'ok';
  const score = fatigueScore(s);
  const symptoms = getSymptoms(s);
  const avg_ear = (s.ear_left!=null && s.ear_right!=null) ? (s.ear_left+s.ear_right)/2 : null;
  const eye  = eyeState(avg_ear, s.eye_occluded && !hasDistractionState(s));
  const attn = attnState(s.distraction, s.yaw, s.eye_occluded);

  // 状态卡
  const sc = $('statusCard');
  sc.className = 'card status-card ' + fc;
  $('statusMain').className = 'status-main ' + fc;
  $('statusMain').textContent = status.main;
  $('statusSub').textContent  = status.sub;

  // 疲劳指数
  const color = scoreColor(score);
  $('scoreNum').textContent = score;
  $('scoreNum').className   = 'score-num ' + fatigueCls;
  const sf = $('scoreFill');
  sf.style.width      = score + '%';
  sf.style.background = color;
  $('scoreDesc').textContent = scoreDesc(score, s.fatigue);
  syncSafetyAlarm(s);

  // 症状
  const sl = $('symptomList');
  if (symptoms.length === 0) {
    sl.innerHTML = '<span class="no-symptom">暂未检测到疲劳或分心信号</span>';
  } else {
    sl.innerHTML = symptoms.map(({t, lvl}) =>
      `<div class="symptom-item"><div class="symptom-dot ${lvl}"></div>${t}</div>`
    ).join('');
  }

  // 眼睛
  $('eyeState').textContent  = eye.text;
  $('eyeState').className    = 'mini-val ' + eye.cls;
  $('eyeBar').style.width    = eye.pct + '%';
  $('eyeBar').style.background = eye.cls==='alrt'?'#b01c22':eye.cls==='warn'?'#9a5f00':'#1a6e3e';

  // 注意力
  $('attnState').textContent = attn.text;
  $('attnState').className   = 'mini-val ' + attn.cls;
  updateBehaviorEvidence(s);

  // 建议
  const adv = adviceMeta(s, fc);
  const ac = $('adviceCard');
  ac.className          = 'advice-card ' + fc;
  $('adviceIcon').textContent  = adv.icon;
  $('adviceTitle').textContent = adv.title;
  $('adviceBody').textContent  = adv.body;
}

function resetUI() {
  attnModel = { emaYaw: null, level: 'ok' };
  headPoseModel = { emaPitch: null };
  lastAlarmBeepTs = 0;
  syncSafetyAlarm(null);
  $('statusCard').className = 'card status-card';
  $('statusMain').className = 'status-main';
  $('statusMain').textContent = '状态良好';
  $('statusSub').textContent  = '系统监测中，请保持专注驾驶';
  $('scoreNum').textContent = '—';
  $('scoreNum').className   = 'score-num';
  $('scoreFill').style.width = '0%';
  $('scoreDesc').textContent = '等待检测数据…';
  $('symptomList').innerHTML = '<span class="no-symptom">暂未检测到疲劳或分心信号</span>';
  $('eyeState').textContent  = '—'; $('eyeState').className = 'mini-val';
  $('attnState').textContent = '—'; $('attnState').className = 'mini-val';
  $('rawDistraction').textContent = '—';
  $('stableDistraction').textContent = '—';
  $('behaviorEvidence').innerHTML = '<span class="no-symptom">等待检测数据…</span>';
  $('eyeBar').style.width = '0%';
  $('adviceCard').className = 'advice-card ok';
  $('adviceIcon').textContent  = '✅';
  $('adviceTitle').textContent = '状态良好';
  $('adviceBody').textContent  = '驾驶状态正常，请继续保持专注。';
}

syncBtn();
</script>
</body>
</html>
